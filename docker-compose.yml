services:
  # ─── PostgreSQL ───────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: nirviz_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - nirviz_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── FastAPI Backend ──────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nirviz_backend
    restart: unless-stopped
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - nirviz_net
    #volumes:
     # - ./backend:/app          # hot-reload in dev
    ports:
      - "8000:8000"             # exposed for direct access during dev

  # ─── Next.js Frontend ────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: nirviz_frontend
    restart: unless-stopped
    env_file: .env
    depends_on:
      - backend
    networks:
      - nirviz_net
    #volumes:
     # - ./frontend:/app          # hot-reload in dev
      #- /app/node_modules        # keep container's node_modules
      #- /app/.next               # keep container's build cache
    ports:
      - "3000:3000"

  # ─── Nginx Reverse Proxy ──────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: nirviz_nginx
    restart: unless-stopped
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
      - frontend
    networks:
      - nirviz_net

volumes:
  pgdata:
    name: nirviz_pgdata

networks:
  nirviz_net:
    name: nirviz_network
    driver: bridge
