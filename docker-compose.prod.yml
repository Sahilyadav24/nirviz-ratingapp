services:
  # ─── PostgreSQL ───────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: nirviz_postgres
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data   # persistent data survives restarts
    networks:
      - nirviz_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M

  # ─── FastAPI Backend ──────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nirviz_backend
    restart: always
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      SECRET_KEY: ${SECRET_KEY}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
      APP_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - nirviz_net
    deploy:
      resources:
        limits:
          memory: 256M

  # ─── Next.js Frontend ────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_GOOGLE_REVIEW_URL: ${NEXT_PUBLIC_GOOGLE_REVIEW_URL}
    container_name: nirviz_frontend
    restart: always
    environment:
      NODE_ENV: production
    networks:
      - nirviz_net
    deploy:
      resources:
        limits:
          memory: 300M

  # ─── Nginx Reverse Proxy ──────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: nirviz_nginx
    restart: always
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"
    depends_on:
      - backend
      - frontend
    networks:
      - nirviz_net
    deploy:
      resources:
        limits:
          memory: 64M

volumes:
  pgdata:
    name: nirviz_pgdata

networks:
  nirviz_net:
    name: nirviz_network
    driver: bridge
